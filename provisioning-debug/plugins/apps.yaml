apiVersion: 1

# Debug-only plugin provisioning. Mounted over /etc/grafana/provisioning/plugins/apps.yaml by
# docker-compose-debug.yaml so the debug container ships with a real logo configured. The asset is
# served with `access-control-allow-origin: *`, so the browser can fetch it at report time.
apps:
  - type: datalabhell-grafanareporter-app
    org_id: 1
    org_name: Main Org.
    disabled: false
    jsonData:
      logos:
        - id: dlh-header
          name: DataLabHell
          dataUrl: 'https://datalabhell.ac.at/static/brand/LOGO_DLH_header.svg'
      layout:
        orientation: 'portrait'
        reportTheme: 'light'
        renderConcurrency: 4
        pageMargin: 32
        header:
          padding: 8
          lineHeight: 12
        footer:
          padding: 8
          lineHeight: 12
        panels:
          perPage: 2
          spacing: 16
          width: 3200
          height: 1800
          title:
            enabled: true
            fontFamily: 'helvetica'
            fontSize: 22
            fontColor: '#000000'
        logo:
          enabled: true
          id: dlh-header
          placement: 'footer'
          alignment: 'left'
          width: 120
          height: 36
        pageNumber:
          enabled: true
          placement: 'footer'
          alignment: 'right'
          language: 'en'
          fontColor: '#000000'
          fontFamily: 'helvetica'
          fontSize: 10
        customElements:
          - type: 'text'
            content: 'Generated by DataLabHell Grafana Reporter'
            placement: 'footer'
            alignment: 'center'
            fontFamily: 'helvetica'
            fontSize: 10
            fontColor: '#000000'
