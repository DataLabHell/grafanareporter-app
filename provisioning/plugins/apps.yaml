apiVersion: 1

apps:
  - type: datalabhell-grafanareporter-app
    org_id: 1
    org_name: Main Org.
    disabled: false
    jsonData:
      # Reusable logo library. Reference an entry from `layout.logo.id`. Each `dataUrl` may be a
      # base64 data URI or a browser-reachable URL (same origin, or a host that sends CORS headers).
      # logos:
      #   - id: 'brand'
      #     name: 'Company logo'
      #     dataUrl: 'https://example.com/logo.svg'
      layout:
        orientation: 'portrait'
        reportTheme: 'light'
        renderConcurrency: 4
        pageMargin: 32
        header:
          padding: 8
          lineHeight: 12
        footer:
          padding: 8
          lineHeight: 12
        panels:
          perPage: 2
          spacing: 16
          width: 3200
          height: 1800
          title:
            enabled: true
            fontFamily: 'helvetica'
            fontSize: 22
            fontColor: '#000000'
        logo:
          # No logo ships with the plugin. Add one to `logos` above and select it with `id: 'brand'`,
          # or set `url` to a direct URL / data URI. Or just upload one in the plugin config UI.
          enabled: false
          # id: 'brand'
          # url: 'https://example.com/logo.svg'
          placement: 'footer'
          alignment: 'left'
          width: 120
          height: 36
        pageNumber:
          enabled: true
          placement: 'footer'
          alignment: 'right'
          language: 'en'
          fontColor: '#000000'
          fontFamily: 'helvetica'
          fontSize: 10
        customElements:
          - type: 'text'
            content: 'Generated by Grafana Reporter'
            placement: 'footer'
            alignment: 'center'
            fontFamily: 'helvetica'
            fontSize: 10
            fontColor: '#000000'
